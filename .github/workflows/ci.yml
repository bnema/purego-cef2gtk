name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Run CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install GTK runtime prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-4-dev libgraphene-1.0-dev libegl1-mesa-dev libgl1-mesa-dev

      - name: Run CI checks
        run: make ci
